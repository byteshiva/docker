name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      versions:
        description: 'Racket versions to build (space-separated, e.g., "9.2 8.17 7.9")'
        required: false
        default: '9.2 8.17 8.0 7.9'
      push_to_ghcr:
        description: 'Push to GHCR?'
        required: true
        default: true
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Make scripts executable
        run: |
          chmod +x ./build.sh
          chmod +x ./test.sh
      
      - name: Build Docker images (AMD64)
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Use versions from workflow input
            ./build.sh ${{ github.event.inputs.versions }}
          else
            # Build all versions on push to main
            ./build.sh
          fi
      
      - name: Test Docker images (AMD64)
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Test only the versions we built
            ./test.sh ${{ github.event.inputs.versions }}
          else
            # Test all images
            ./test.sh 9.2
          fi
      
      - name: Tag and push AMD64 images to GHCR
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_ghcr == 'true')
        run: |
          # Get all built racket images
          IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^racket/racket:" | sort -u)
          
          # Determine which versions to push
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS_TO_PUSH="${{ github.event.inputs.versions }}"
          else
            # On push to main, push specific versions (you can adjust this list)
            VERSIONS_TO_PUSH="9.2 9.1 8.17 8.0 7.9"
          fi
          
          echo "Pushing AMD64 versions: $VERSIONS_TO_PUSH"
          
          # Push each image
          for version in $VERSIONS_TO_PUSH; do
            # Find all tags for this version
            for tag in $(docker images --format "{{.Tag}}" | grep "^$version" | sort -u); do
              local_image="racket/racket:$tag"
              ghcr_image="ghcr.io/${{ github.repository_owner }}/racket:$tag-amd64"
              
              echo "Tagging $local_image -> $ghcr_image"
              docker tag "$local_image" "$ghcr_image"
              
              echo "Pushing $ghcr_image"
              docker push "$ghcr_image"
            done
          done
          
          echo "✅ AMD64 images pushed to GHCR"
      
      - name: Build and push Raspberry Pi (ARM) images
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_ghcr == 'true')
        run: |
          # Determine which versions to build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS="${{ github.event.inputs.versions }}"
          else
            VERSIONS="9.2 9.1 8.17 8.0 7.9"
          fi
          
          echo "Building ARM images for versions: $VERSIONS"
          
          # Create and use a multi-architecture builder
          docker buildx create --name multiarch --use
          docker buildx inspect --bootstrap
          
          for version in $VERSIONS; do
            echo "========================================="
            echo "Building Racket $version for Raspberry Pi (ARM)"
            echo "========================================="
            
            # Build ARM images using build.sh with platform override
            # We'll use buildx to build ARM versions of the official Racket images
            docker buildx build \
              --platform linux/arm64,linux/arm/v7 \
              --build-arg RACKET_VERSION="$version" \
              --tag "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64" \
              --tag "ghcr.io/${{ github.repository_owner }}/racket:$version-armv7" \
              --push \
              - <<EOF
            ARG RACKET_VERSION
            FROM racket/racket:\${RACKET_VERSION}
            LABEL org.opencontainers.image.source="https://github.com/${{ github.repository }}"
            LABEL org.opencontainers.image.description="Racket \$RACKET_VERSION for ARM"
            RUN apt-get update && apt-get install -y --no-install-recommends \
                build-essential \
                git \
                && rm -rf /var/lib/apt/lists/*
            WORKDIR /app
            CMD ["racket"]
            EOF
            
            if [ $? -eq 0 ]; then
              echo "✅ Successfully built and pushed Racket $version for ARM"
            else
              echo "❌ Failed to build Racket $version for ARM"
              exit 1
            fi
          done
          
          # Also build a combined multi-arch manifest
          echo "========================================="
          echo "Creating multi-architecture manifests"
          echo "========================================="
          
          for version in $VERSIONS; do
            echo "Creating manifest for Racket $version"
            
            # Create a manifest that points to both AMD64 and ARM images
            docker manifest create \
              "ghcr.io/${{ github.repository_owner }}/racket:$version" \
              "ghcr.io/${{ github.repository_owner }}/racket:$version-amd64" \
              "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64" \
              "ghcr.io/${{ github.repository_owner }}/racket:$version-armv7"
            
            # Push the manifest
            docker manifest push "ghcr.io/${{ github.repository_owner }}/racket:$version"
            
            echo "✅ Created manifest for Racket $version"
          done
          
          # Create latest manifest
          echo "Creating latest manifest"
          docker manifest create \
            "ghcr.io/${{ github.repository_owner }}/racket:latest" \
            "ghcr.io/${{ github.repository_owner }}/racket:9.2-amd64" \
            "ghcr.io/${{ github.repository_owner }}/racket:9.2-arm64" \
            "ghcr.io/${{ github.repository_owner }}/racket:9.2-armv7"
          
          docker manifest push "ghcr.io/${{ github.repository_owner }}/racket:latest"
          
          echo "✅ All ARM images and manifests pushed to GHCR"
      
      - name: List pushed images
        if: success()
        run: |
          echo "Pushed images to GHCR:"
          echo ""
          echo "AMD64 images:"
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep "ghcr.io" | grep "amd64" | sort
          echo ""
          echo "ARM images:"
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep "ghcr.io" | grep -E "arm64|armv7" | sort
          echo ""
          echo "Multi-architecture manifests (use these for automatic architecture selection):"
          echo "  ghcr.io/${{ github.repository_owner }}/racket:9.2"
          echo "  ghcr.io/${{ github.repository_owner }}/racket:9.1"
          echo "  ghcr.io/${{ github.repository_owner }}/racket:8.17"
          echo "  ghcr.io/${{ github.repository_owner }}/racket:8.0"
          echo "  ghcr.io/${{ github.repository_owner }}/racket:7.9"
          echo "  ghcr.io/${{ github.repository_owner }}/racket:latest"
