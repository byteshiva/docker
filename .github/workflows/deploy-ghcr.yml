name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      versions:
        description: 'Racket versions to build (space-separated, e.g., "9.2 8.17 7.9")'
        required: false
        default: '9.2 8.17 8.0 7.9'
      push_to_ghcr:
        description: 'Push to GHCR?'
        required: true
        default: true
        type: boolean
      platforms:
        description: 'Platforms to build for (comma-separated)'
        required: false
        default: 'linux/amd64,linux/arm64,linux/arm/v7'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Make scripts executable
        run: |
          chmod +x ./build.sh
          chmod +x ./test.sh
      
      - name: Build and push multi-architecture Docker images
        run: |
          # Determine which versions to build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS="${{ github.event.inputs.versions }}"
            PLATFORMS="${{ github.event.inputs.platforms }}"
          else
            VERSIONS="9.2 8.17 8.0 7.9"
            PLATFORMS="linux/amd64,linux/arm64,linux/arm/v7"
          fi
          
          echo "Building versions: $VERSIONS"
          echo "Building for platforms: $PLATFORMS"
          
          # Build and push each version
          for version in $VERSIONS; do
            echo "========================================="
            echo "Building Racket $version for $PLATFORMS"
            echo "========================================="
            
            # Build and push multi-arch image
            docker buildx build \
              --platform "$PLATFORMS" \
              --build-arg RACKET_VERSION="$version" \
              --tag "ghcr.io/${{ github.repository_owner }}/racket:$version" \
              --tag "ghcr.io/${{ github.repository_owner }}/racket:$version-full" \
              --push \
              -f Dockerfile \
              .
            
            # Check if build was successful
            if [ $? -eq 0 ]; then
              echo "✅ Successfully built and pushed Racket $version"
            else
              echo "❌ Failed to build Racket $version"
              exit 1
            fi
          done
          
          # Build and push latest tag for the newest stable version
          echo "========================================="
          echo "Building and pushing latest tag"
          echo "========================================="
          
          docker buildx build \
            --platform "$PLATFORMS" \
            --build-arg RACKET_VERSION="9.2" \
            --tag "ghcr.io/${{ github.repository_owner }}/racket:latest" \
            --push \
            -f Dockerfile \
            .
          
          echo "✅ All images pushed to GHCR"
      
      - name: Test Docker images (AMD64 only)
        if: success()
        run: |
          # Determine which versions to test
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS_TO_TEST="${{ github.event.inputs.versions }}"
          else
            VERSIONS_TO_TEST="9.2"
          fi
          
          echo "Testing versions: $VERSIONS_TO_TEST"
          
          for version in $VERSIONS_TO_TEST; do
            echo "Testing Racket $version"
            
            # Test AMD64 version (available on GitHub Actions runner)
            docker run --rm --platform linux/amd64 "ghcr.io/${{ github.repository_owner }}/racket:$version" racket --version || echo "⚠️ Test failed for $version (may be expected for ARM-only builds)"
          done
      
      - name: List pushed images
        if: success()
        run: |
          echo "Pushed multi-architecture images to GHCR:"
          echo ""
          echo "Available images:"
          
          # List all tags pushed
          for version in 9.2 8.17 8.0 7.9 latest; do
            echo "  ghcr.io/${{ github.repository_owner }}/racket:$version"
          done
          
          echo ""
          echo "Each image includes these architectures:"
          echo "  - linux/amd64 (x86_64)"
          echo "  - linux/arm64 (ARM 64-bit, including Raspberry Pi 3/4/5)"
          echo "  - linux/arm/v7 (ARM 32-bit, including Raspberry Pi 2/3)"
