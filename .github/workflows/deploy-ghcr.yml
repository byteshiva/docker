name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      versions:
        description: 'Racket versions to build (space-separated, e.g., "9.2 8.17 7.9")'
        required: false
        default: '9.2 8.17 8.0 7.9'
      push_to_ghcr:
        description: 'Push to GHCR?'
        required: true
        default: true
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Make scripts executable
        run: |
          chmod +x ./build.sh
          chmod +x ./test.sh
      
      - name: Build Docker images (AMD64)
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Use versions from workflow input
            ./build.sh ${{ github.event.inputs.versions }}
          else
            # Build all versions on push to main
            ./build.sh
          fi
      
      - name: Test Docker images (AMD64)
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Test only the versions we built
            ./test.sh ${{ github.event.inputs.versions }}
          else
            # Test all images
            ./test.sh 9.2
          fi
      
      - name: Tag and push AMD64 images to GHCR
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_ghcr == 'true')
        run: |
          # Get all built racket images
          IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^racket/racket:" | sort -u)
          
          # Determine which versions to push
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS_TO_PUSH="${{ github.event.inputs.versions }}"
          else
            # On push to main, push specific versions (you can adjust this list)
            VERSIONS_TO_PUSH="9.2 9.1 8.17 8.0 7.9"
          fi
          
          echo "Pushing AMD64 versions: $VERSIONS_TO_PUSH"
          
          # Push each image
          for version in $VERSIONS_TO_PUSH; do
            # Find all tags for this version
            for tag in $(docker images --format "{{.Tag}}" | grep "^$version" | sort -u); do
              local_image="racket/racket:$tag"
              ghcr_image="ghcr.io/${{ github.repository_owner }}/racket:$tag-amd64"
              
              echo "Tagging $local_image -> $ghcr_image"
              docker tag "$local_image" "$ghcr_image"
              
              echo "Pushing $ghcr_image"
              docker push "$ghcr_image"
            done
          done
          
          echo "✅ AMD64 images pushed to GHCR"
      
      - name: Create Dockerfile for ARM builds
        run: |
          cat > Dockerfile.arm << 'EOF'
          ARG RACKET_VERSION
          FROM --platform=linux/arm64 racket/racket:${RACKET_VERSION}
          
          # Fix Debian repository issues by using specific codename
          RUN echo "deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware" > /etc/apt/sources.list && \
              echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware" >> /etc/apt/sources.list && \
              echo "deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" >> /etc/apt/sources.list
          
          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential \
              git \
              ca-certificates \
              && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          CMD ["racket"]
          EOF
      
      - name: Build and push Raspberry Pi (ARM64) images
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_ghcr == 'true')
        run: |
          # Determine which versions to build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS="${{ github.event.inputs.versions }}"
          else
            VERSIONS="9.2 9.1 8.17 8.0 7.9"
          fi
          
          echo "Building ARM64 images for versions: $VERSIONS"
          
          # Create and use a multi-architecture builder
          docker buildx create --name multiarch --use || true
          docker buildx inspect --bootstrap
          
          for version in $VERSIONS; do
            echo "========================================="
            echo "Building Racket $version for ARM64"
            echo "========================================="
            
            # Build ARM64 image
            docker buildx build \
              --platform linux/arm64 \
              --build-arg RACKET_VERSION="$version" \
              --tag "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64" \
              --push \
              -f Dockerfile.arm \
              .
            
            if [ $? -eq 0 ]; then
              echo "✅ Successfully built and pushed Racket $version for ARM64"
            else
              echo "❌ Failed to build Racket $version for ARM64"
              exit 1
            fi
          done
          
          echo "✅ All ARM64 images pushed to GHCR"
      
      - name: Create multi-architecture manifests
        if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_ghcr == 'true')
        run: |
          # Determine which versions to build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSIONS="${{ github.event.inputs.versions }}"
          else
            VERSIONS="9.2 9.1 8.17 8.0 7.9"
          fi
          
          echo "Creating multi-architecture manifests for versions: $VERSIONS"
          
          for version in $VERSIONS; do
            echo "Creating manifest for Racket $version"
            
            # Check if images exist and are not manifest lists
            AMD64_EXISTS=false
            ARM64_EXISTS=false
            
            # Check AMD64
            if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:$version-amd64" > /dev/null 2>&1; then
              # Check if it's a manifest list (platform specific)
              if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:$version-amd64" | grep -q "mediaType.*application/vnd.docker.distribution.manifest.v2+json"; then
                AMD64_EXISTS=true
              fi
            fi
            
            # Check ARM64
            if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64" > /dev/null 2>&1; then
              if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64" | grep -q "mediaType.*application/vnd.docker.distribution.manifest.v2+json"; then
                ARM64_EXISTS=true
              fi
            fi
            
            echo "Image availability: AMD64=$AMD64_EXISTS, ARM64=$ARM64_EXISTS"
            
            # Create manifest if at least one architecture exists
            if [ "$AMD64_EXISTS" = "true" ] || [ "$ARM64_EXISTS" = "true" ]; then
              # Remove existing manifest if it exists
              docker manifest rm "ghcr.io/${{ github.repository_owner }}/racket:$version" 2>/dev/null || true
              
              # Create new manifest
              if [ "$AMD64_EXISTS" = "true" ]; then
                docker manifest create "ghcr.io/${{ github.repository_owner }}/racket:$version" \
                  "ghcr.io/${{ github.repository_owner }}/racket:$version-amd64"
              fi
              
              if [ "$ARM64_EXISTS" = "true" ]; then
                docker manifest create --amend "ghcr.io/${{ github.repository_owner }}/racket:$version" \
                  "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64"
              fi
              
              # Annotate with architecture info
              if [ "$AMD64_EXISTS" = "true" ]; then
                docker manifest annotate "ghcr.io/${{ github.repository_owner }}/racket:$version" \
                  "ghcr.io/${{ github.repository_owner }}/racket:$version-amd64" \
                  --arch amd64 --os linux
              fi
              
              if [ "$ARM64_EXISTS" = "true" ]; then
                docker manifest annotate "ghcr.io/${{ github.repository_owner }}/racket:$version" \
                  "ghcr.io/${{ github.repository_owner }}/racket:$version-arm64" \
                  --arch arm64 --os linux
              fi
              
              # Push the manifest
              docker manifest push "ghcr.io/${{ github.repository_owner }}/racket:$version"
              echo "✅ Created manifest for Racket $version"
            else
              echo "⚠️ No single-architecture images found for Racket $version, skipping manifest"
            fi
          done
          
          # Create latest manifest
          echo "Creating latest manifest"
          
          AMD64_EXISTS=false
          ARM64_EXISTS=false
          
          # Check AMD64
          if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:9.2-amd64" > /dev/null 2>&1; then
            if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:9.2-amd64" | grep -q "mediaType.*application/vnd.docker.distribution.manifest.v2+json"; then
              AMD64_EXISTS=true
            fi
          fi
          
          # Check ARM64
          if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:9.2-arm64" > /dev/null 2>&1; then
            if docker manifest inspect "ghcr.io/${{ github.repository_owner }}/racket:9.2-arm64" | grep -q "mediaType.*application/vnd.docker.distribution.manifest.v2+json"; then
              ARM64_EXISTS=true
            fi
          fi
          
          if [ "$AMD64_EXISTS" = "true" ] || [ "$ARM64_EXISTS" = "true" ]; then
            # Remove existing manifest
            docker manifest rm "ghcr.io/${{ github.repository_owner }}/racket:latest" 2>/dev/null || true
            
            # Create manifest
            if [ "$AMD64_EXISTS" = "true" ]; then
              docker manifest create "ghcr.io/${{ github.repository_owner }}/racket:latest" \
                "ghcr.io/${{ github.repository_owner }}/racket:9.2-amd64"
            fi
            
            if [ "$ARM64_EXISTS" = "true" ]; then
              docker manifest create --amend "ghcr.io/${{ github.repository_owner }}/racket:latest" \
                "ghcr.io/${{ github.repository_owner }}/racket:9.2-arm64"
            fi
            
            # Annotate
            if [ "$AMD64_EXISTS" = "true" ]; then
              docker manifest annotate "ghcr.io/${{ github.repository_owner }}/racket:latest" \
                "ghcr.io/${{ github.repository_owner }}/racket:9.2-amd64" \
                --arch amd64 --os linux
            fi
            
            if [ "$ARM64_EXISTS" = "true" ]; then
              docker manifest annotate "ghcr.io/${{ github.repository_owner }}/racket:latest" \
                "ghcr.io/${{ github.repository_owner }}/racket:9.2-arm64" \
                --arch arm64 --os linux
            fi
            
            docker manifest push "ghcr.io/${{ github.repository_owner }}/racket:latest"
            echo "✅ Created latest manifest"
          else
            echo "⚠️ No images found for latest, skipping"
          fi
          
          echo "✅ All manifests created and pushed"
      
      - name: List pushed images
        if: success()
        run: |
          echo "=========================================="
          echo "Pushed images to GHCR:"
          echo "=========================================="
          echo ""
          echo "AMD64 images:"
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep "ghcr.io" | grep "amd64" | sort || echo "No AMD64 images found"
          echo ""
          echo "ARM64 images:"
          docker images --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}" | grep "ghcr.io" | grep "arm64" | sort || echo "No ARM64 images found"
          echo ""
          echo "=========================================="
          echo "✅ Multi-architecture images available:"
          echo "=========================================="
          echo ""
          echo "Your Raspberry Pi is aarch64 (ARM64)"
          echo "Use these tags for automatic architecture selection:"
          for version in 9.2 9.1 8.17 8.0 7.9; do
            echo "  ghcr.io/${{ github.repository_owner }}/racket:$version"
          done
          echo "  ghcr.io/${{ github.repository_owner }}/racket:latest"
          echo ""
          echo "Architecture-specific tags (for debugging):"
          echo "  *-amd64  - x86_64 (Intel/AMD)"
          echo "  *-arm64  - ARM64/aarch64 (Raspberry Pi 4/5)"
